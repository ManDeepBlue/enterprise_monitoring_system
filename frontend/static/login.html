
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login • Enterprise Monitoring</title>
  <link rel="stylesheet" href="/assets.css"/>
</head>
<body>
  <main style="max-width:420px;margin:8vh auto;padding:22px">
    <div class="card">
      <div class="brand" style="margin-bottom:10px">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1 style="font-size:16px;margin:0">Enterprise Monitoring</h1>
          <div class="small">Administrator Login</div>
        </div>
      </div>

      <div class="notice">
        First run: call <code>/api/auth/bootstrap-admin?email=...&password=...</code> once to create an admin.
      </div>
      <div style="height:12px"></div>

      <label class="small">Email</label>
      <input class="input" id="email" type="email" autocomplete="username" />
      <div style="height:10px"></div>

      <label class="small">Password</label>
      <input class="input" id="password" type="password" autocomplete="current-password" />
      <div style="height:14px"></div>

      <button class="btn" id="btn">Sign in</button>
      <div class="small" id="err" style="margin-top:10px;color:var(--danger)"></div>
    </div>
  </main>

<script>
const API = location.origin;
document.getElementById("btn").onclick = async () => {
  document.getElementById("err").textContent = "";
  try{
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const res = await fetch(API + "/api/auth/login", {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({email,password})
    });
    if(!res.ok) throw new Error(await res.text());
    const data = await res.json();
    localStorage.setItem("token", data.access_token);
    location.href="/index.html";
  }catch(e){
    document.getElementById("err").textContent = "Login failed. " + (e.message||"");
  }
};
</script>
</body>
</html>
