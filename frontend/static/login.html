<!doctype html>
<!--
  Login Page
  ----------
  Handles administrator authentication. 
  Provides a secure interface for users to enter their credentials 
  and receive a JWT token for subsequent API requests.
-->
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login • Enterprise Monitoring</title>
  <link rel="stylesheet" href="/assets.css"/>
</head>
<body>
  <main style="max-width:420px;margin:8vh auto;padding:22px">
    <div class="card">
      <div class="brand" style="margin-bottom:10px">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1 style="font-size:16px;margin:0">Enterprise Monitoring</h1>
          <div class="small">Administrator Login</div>
        </div>
      </div>

      <!-- Hint for initial setup - should be removed in production environments -->
      <div class="notice">
        Create admin through <code>/api/auth/bootstrap-admin?email=...&password=...</code>.
      </div>
      <div style="height:12px"></div>

      <label class="small">Email</label>
      <input class="input" id="email" type="email" autocomplete="username" />
      <div style="height:10px"></div>

      <label class="small">Password</label>
      <input class="input" id="password" type="password" autocomplete="current-password" />
      <div style="height:14px"></div>

      <button class="btn" id="btn">Sign in</button>
      <div class="small" id="err" style="margin-top:10px;color:var(--danger)"></div>
    </div>
  </main>

<script>
/**
 * Login handler script
 */
const API = location.origin;

/**
 * Handle login button click.
 * Authenticates user, stores JWT in localStorage, and redirects to dashboard.
 */
document.getElementById("btn").onclick = async () => {
  const errEl = document.getElementById("err");
  errEl.textContent = "";
  
  try {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    
    if (!email || !password) {
      errEl.textContent = "Please enter both email and password.";
      return;
    }

    const res = await fetch(API + "/api/auth/login", {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({email,password})
    });
    
    if(!res.ok) {
      const errorData = await res.json().catch(() => ({ detail: "Invalid credentials" }));
      throw new Error(errorData.detail || "Login failed");
    }
    
    const data = await res.json();
    console.log("Login success, role:", data.role);
    
    // Store authentication data securely in local storage
    localStorage.setItem("token", data.access_token);
    localStorage.setItem("role", data.role);
    
    // Redirect to the main dashboard
    location.href="/index.html";
  } catch(e) {
    errEl.textContent = "Login failed: " + e.message;
  }
};

/**
 * Allow "Enter" key to trigger login
 */
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById("btn").click();
  }
});
</script>
</body>
</html>
